name: Release QGIS Plugin

on:
  push:
    tags:
      - '*'

jobs:
  build-release:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install zip
        run: sudo apt-get install zip -y

      - name: Build plugin zip
        run: |
	  mkdir -p IGN_objets_preferes
    	  rsync -av --progress . IGN_objets_preferes/ \
      		--exclude .git \
      		--exclude .github \
      		--exclude IGN_objets_preferes
          zip -r "IGN_objets_preferes.zip" . -x ".git/*" ".github/*"

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: "IGN_objets_preferes.zip"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}